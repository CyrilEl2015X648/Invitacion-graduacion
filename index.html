<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Especial</title>

<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    font-family:Georgia, serif;


    /* Difuminado de verdes */
    background:
    linear-gradient(
        135deg,
        #006400,
        #009b77,
        #b7e532,
        #d8f5a2
    );

}


/* Estrellas elegantes */

body::before{

    content:"✦  ✨  ⭐  ✧  ✦  ✨  ⭐  ✧";

    position:absolute;

    width:100%;
    height:100%;

    color:white;

    font-size:45px;

    letter-spacing:35px;

    line-height:130px;

    opacity:.35;

    animation:
    estrellas 6s infinite alternate;

}



@keyframes estrellas{

from{

transform:translateY(0);

opacity:.3;

}


to{

transform:translateY(-40px);

opacity:.8;

}

}




/* Luz difuminada */

body::after{

    content:"";

    position:absolute;

    width:600px;

    height:600px;


    background:

    radial-gradient(
        circle,
        rgba(255,255,255,.45),
        transparent 65%
    );


    filter:blur(50px);

    animation:
    luces 5s infinite alternate;

}



@keyframes luces{


from{

transform:translate(-80px,-50px);

}


to{

transform:translate(80px,50px);

}

}



/* Tarjeta */


.tarjeta{


    width:380px;

    padding:40px;


    background:

    linear-gradient(
        145deg,
        rgba(255,255,255,.96),
        rgba(240,255,220,.96)
    );


    border-radius:35px;


    border:

    4px solid #d4af37;


    box-shadow:

    0 0 30px #d4af37,
    0 0 80px rgba(255,255,255,.8);



    text-align:center;


    z-index:2;


    transition:1.2s;


}




.tarjeta:hover{

transform:scale(1.05);

}



/* Título */


h1{

color:#075c38;

font-size:30px;


text-shadow:

0 0 10px #d4af37;

}



/* Botón */


button{


margin-top:35px;


padding:

18px 65px;


border:none;


border-radius:50px;


cursor:pointer;


font-size:22px;


font-weight:bold;


color:white;



background:

linear-gradient(

45deg,

#86c96b,

#d4af37,

#b7e532

);



box-shadow:

0 0 25px #d4af37,
inset 0 0 15px white;



animation:

brillo 2s infinite;


}




@keyframes brillo{


50%{


box-shadow:

0 0 50px white,
0 0 70px #d4af37;


}


}




button:hover{


transform:scale(1.15);


}




/* Mensaje al abrir */


.mensaje{


display:none;


margin-top:30px;


font-size:24px;


color:#075c38;


animation:

aparecer 1.5s;


}





@keyframes aparecer{


from{


opacity:0;

transform:translateY(40px);


}


to{


opacity:1;

transform:translateY(0);


}


}




.abierta{


transform:

rotateY(360deg);


}



</style>

</head>



<body>



<div class="tarjeta" id="tarjeta">


<h1>

✨ Te ha llegado una invitación especial ✨

</h1>



<button onclick="abrir()">

💌 Abrir

</button>



<div class="mensaje" id="mensaje">
</div>



</div>




<script>


function abrir(){


document.getElementById("tarjeta")

.classList.add("abierta");



document.getElementById("mensaje")

.style.display="block";

  setTimeout(() => {
                window.location.href = 'Graduacion.html'; 
            }, 1000);

}



</script>



</body>

</html>
